{% extends "base.html" %}

{% block title %}Change password{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto">
    <div class="mb-8 border-b border-gray-800 pb-6">
        <p class="text-xs uppercase tracking-widest text-gray-600 mb-1">Security</p>
        <h1 class="text-xl font-bold text-white">Change password</h1>
    </div>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-4">
            <label class="block text-xs uppercase tracking-widest text-gray-600 mb-1">{{ field.label }}</label>
            <input type="{{ field.field.widget.input_type }}"
                   name="{{ field.html_name }}"
                   id="{{ field.id_for_label }}"
                   class="w-full bg-gray-900 border border-gray-800 focus:border-gray-600 outline-none px-3 py-2 text-sm text-gray-200 transition">
            {% if field.errors %}
            <p class="text-xs text-red-400 mt-1">{{ field.errors|join:", " }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit"
            class="w-full border border-indigo-600 hover:bg-indigo-600 text-white text-sm py-2.5 uppercase tracking-widest transition mt-2">
            Update password →
        </button>
    </form>
</div>
{% endblock %}
