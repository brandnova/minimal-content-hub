{% extends "base.html" %}

{% block title %}Password updated — {{ site.site_name }}{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto">

    <div class="mb-8 border-b border-gray-800 pb-6">
        <p class="text-xs uppercase tracking-widest text-gray-600 mb-1">All done</p>
        <h1 class="text-xl font-bold text-white">Password updated</h1>
    </div>

    <div class="border border-gray-800 p-5 mb-6">
        <p class="text-sm text-gray-400 leading-relaxed">
            Your password has been changed successfully. You can now log in with your new password.
        </p>
    </div>

    <a href="{% url 'account_login' %}"
       class="inline-block w-full text-center border border-indigo-600 hover:bg-indigo-600 text-white text-sm py-2.5 uppercase tracking-widest transition">
        Log in →
    </a>

</div>
{% endblock %}
